<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TraceGreens — Chef-Grade Microgreens{% endblock %}</title>
    <!-- Favicon & Brand Icons -->
    <link rel="shortcut icon" href="/favicon.ico?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-900: #0d3b11;
            --green-800: #145a1c;
            --green-700: #1b7a25;
            --green-600: #22952e;
            --green-500: #2ecc40;
            --green-100: #e8f7ea;
            --green-50: #f2fbf3;
            --warm: #faf9f6;
            --dark: #111;
            --gray-800: #2d2d2d;
            --gray-600: #555;
            --gray-400: #999;
            --gray-200: #e5e5e5;
            --gray-100: #f5f5f5;
            --gold: #c4993c;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--dark);
            line-height: 1.65;
            background: radial-gradient(ellipse at center, white 50%, var(--green-50) 85%, var(--green-100) 100%) fixed;
            -webkit-font-smoothing: antialiased;
        }
        /* ---- NAV ---- */
        .pub-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 0 2rem;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .pub-nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem; font-weight: 700; color: var(--green-800);
            text-decoration: none;
        }
        .pub-nav .logo span { color: var(--green-600); }
        .pub-nav .nav-links { display: flex; align-items: center; gap: 2rem; }
        .pub-nav .nav-links a {
            font-size: 0.88rem; font-weight: 500; color: var(--gray-600);
            text-decoration: none; transition: color 0.2s;
        }
        .pub-nav .nav-links a:hover { color: var(--green-700); }
        .pub-nav .nav-links a.nav-cta {
            background: var(--green-800); color: white;
            padding: 0.5rem 1.25rem; border-radius: 6px;
            font-weight: 600; font-size: 0.84rem;
        }
        .pub-nav .nav-links a.nav-cta:hover { background: var(--green-900); }
        /* ---- SECTIONS ---- */
        section { padding: 5rem 2rem; }
        .container { max-width: 1080px; margin: 0 auto; }
        .section-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--green-700); margin-bottom: 0.5rem;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; font-weight: 700; color: var(--dark);
            margin-bottom: 0.5rem; line-height: 1.25;
        }
        .section-sub {
            font-size: 1.05rem; color: var(--gray-600);
            max-width: 560px; margin-bottom: 2.5rem;
        }
        /* ---- HERO ---- */
        .hero {
            min-height: 100vh;
            display: flex; align-items: center;
            background: linear-gradient(135deg, var(--green-50) 0%, white 50%, #f9faf7 100%);
            padding-top: 64px;
        }
        .hero .container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem; font-weight: 700; line-height: 1.15;
            color: var(--dark); margin-bottom: 1.25rem;
        }
        .hero h1 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--green-700), var(--green-500));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.1rem; color: var(--gray-600);
            margin-bottom: 2rem; max-width: 440px;
        }
        .hero-actions { display: flex; gap: 1rem; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: var(--green-800);
            color: white; border: none; border-radius: 6px;
            font-size: 0.92rem; font-weight: 600; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--green-900); transform: translateY(-1px); }
        .btn-secondary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: white;
            color: var(--green-800); border: 1.5px solid var(--green-800);
            border-radius: 6px; font-size: 0.92rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--green-50); }
        .hero-visual {
            background: linear-gradient(135deg, var(--green-100), var(--green-50));
            border-radius: 20px; height: 420px;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .hero-visual .hero-img {
            width: 100%; height: 100%;
            object-fit: cover; border-radius: 20px;
        }
        .hero-stat-row {
            position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;
            display: flex; gap: 0.75rem;
        }
        .hero-stat {
            flex: 1; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 0.85rem 1rem; text-align: center;
        }
        .hero-stat .val {
            font-size: 1.4rem; font-weight: 800; color: var(--green-800);
        }
        .hero-stat .lbl {
            font-size: 0.68rem; color: var(--gray-400); text-transform: uppercase;
            letter-spacing: 0.05em; font-weight: 600;
        }
        /* ---- FEATURES ---- */
        .features { background: white; }
        .features-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
        }
        .feature-card {
            padding: 1.75rem;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            transition: all 0.25s;
        }
        .feature-card:hover {
            border-color: var(--green-600);
            box-shadow: 0 8px 30px rgba(30,130,50,0.08);
            transform: translateY(-2px);
        }
        .feature-icon {
            width: 44px; height: 44px;
            background: var(--green-100); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--green-700); margin-bottom: 1rem;
        }
        .feature-card h3 {
            font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem;
        }
        .feature-card p {
            font-size: 0.88rem; color: var(--gray-600); line-height: 1.55;
        }
        /* ---- TRACE SECTION ---- */
        .trace-section {
            background: var(--green-900); color: white;
        }
        .trace-section .section-label { color: var(--green-500); }
        .trace-section .section-title { color: white; }
        .trace-section .section-sub { color: rgba(255,255,255,0.65); }
        .trace-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; padding: 2rem;
            max-width: 600px;
        }
        .trace-input-row { display: flex; gap: 0.75rem; }
        .trace-input {
            flex: 1; padding: 0.8rem 1.1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; font-size: 1rem;
            background: rgba(255,255,255,0.06); color: white;
            outline: none; font-family: 'Inter', sans-serif;
        }
        .trace-input::placeholder { color: rgba(255,255,255,0.35); }
        .trace-input:focus { border-color: var(--green-500); }
        .trace-btn {
            padding: 0.8rem 2rem; background: var(--green-500);
            color: var(--green-900); border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        .trace-btn:hover { background: #3ddb52; }
        /* Trace result */
        .trace-result {
            margin-top: 2rem; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 1.5rem;
        }
        .trace-result h3 {
            font-size: 1.15rem; margin-bottom: 0.2rem;
        }
        .trace-result .variety {
            font-size: 0.88rem; color: rgba(255,255,255,0.55); margin-bottom: 1.25rem;
        }
        .trace-timeline { position: relative; padding-left: 1.75rem; }
        .trace-timeline::before {
            content: ''; position: absolute; left: 0.35rem; top: 0.5rem; bottom: 0.5rem;
            width: 2px; background: rgba(255,255,255,0.15);
        }
        .t-step { position: relative; margin-bottom: 1.25rem; }
        .t-step::before {
            content: ''; position: absolute; left: -1.55rem; top: 0.35rem;
            width: 10px; height: 10px; border-radius: 50%;
        }
        .t-step.done::before { background: var(--green-500); }
        .t-step.upcoming::before { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); width: 10px; height: 10px; }
        .t-step .t-date { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .t-step .t-event { font-weight: 600; font-size: 0.92rem; }
        .t-step .t-detail { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
        .trace-badge {
            display: inline-block; padding: 0.2rem 0.65rem;
            border-radius: 20px; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .trace-badge-blackout { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
        .trace-badge-light { background: rgba(255,200,50,0.2); color: #ffd54f; }
        .trace-badge-harvested { background: rgba(46,204,64,0.2); color: var(--green-500); }
        .trace-badge-discarded { background: rgba(255,50,50,0.2); color: #ff6b6b; }
        .trace-error {
            margin-top: 1rem; padding: 0.8rem 1rem;
            background: rgba(255,80,80,0.12); border-radius: 8px;
            color: #ff8a8a; font-size: 0.88rem;
        }
        /* ---- HOW IT WORKS ---- */
        .how-section { background: var(--warm); }
        .steps-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
        }
        .step-card { text-align: center; }
        .step-num {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--green-800); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 800;
            margin: 0 auto 1rem;
        }
        .step-card h3 { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.3rem; }
        .step-card p { font-size: 0.82rem; color: var(--gray-600); }
        /* ---- GALLERY ---- */
        .gallery-section { background: white; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem;
        }
        .gallery-item {
            border-radius: 12px; overflow: hidden; background: white;
            border: 1px solid var(--gray-200); transition: all 0.25s;
        }
        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .gallery-item img {
            width: 100%; height: 220px; object-fit: cover; display: block;
        }
        .gallery-caption {
            padding: 0.75rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .gallery-batch {
            font-size: 0.78rem; font-weight: 600; color: var(--green-800);
        }
        .gallery-desc {
            font-size: 0.78rem; color: var(--gray-600); margin-top: 0.2rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .gallery-date {
            font-size: 0.72rem; color: var(--gray-400); white-space: nowrap;
        }
        .gallery-empty {
            text-align: center; padding: 3rem 1rem;
            color: var(--gray-400); font-size: 0.92rem;
        }
        /* ---- ORDER / CONTACT ---- */
        .order-section { background: white; }
        .contact-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;
        }
        .contact-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; }
        .contact-info p { font-size: 0.92rem; color: var(--gray-600); margin-bottom: 1rem; }
        .contact-detail {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 0; border-bottom: 1px solid var(--gray-100);
            font-size: 0.9rem;
        }
        .contact-detail .cd-label { color: var(--gray-400); min-width: 70px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .contact-form {
            background: var(--gray-100); border-radius: 16px; padding: 2rem;
        }
        .contact-form h3 {
            font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem;
        }
        .cf-group { margin-bottom: 0.85rem; }
        .cf-group label {
            display: block; font-size: 0.78rem; font-weight: 600;
            color: var(--gray-600); margin-bottom: 0.25rem;
        }
        .cf-input {
            width: 100%; padding: 0.55rem 0.8rem;
            border: 1.5px solid var(--gray-200); border-radius: 6px;
            font-size: 0.9rem; outline: none; font-family: 'Inter', sans-serif;
            background: white; transition: border-color 0.2s;
        }
        .cf-input:focus { border-color: var(--green-600); }
        textarea.cf-input { resize: vertical; min-height: 80px; }
        .cf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
        /* ---- FOOTER ---- */
        .pub-footer {
            background: var(--dark); color: rgba(255,255,255,0.5);
            padding: 3rem 2rem; text-align: center; font-size: 0.82rem;
        }
        .pub-footer .f-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem; font-weight: 700; color: white;
            margin-bottom: 0.5rem;
        }
        /* ---- HAMBURGER ---- */
        .pub-hamburger {
            display: none; background: none; border: none; cursor: pointer;
            padding: 0.5rem; flex-direction: column; gap: 5px;
        }
        .pub-hamburger span {
            display: block; width: 22px; height: 2px; background: var(--gray-600);
            border-radius: 2px; transition: all 0.3s;
        }
        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .pub-hamburger { display: flex; }
            .pub-nav .nav-links {
                display: none; position: absolute; top: 64px; left: 0; right: 0;
                background: white; flex-direction: column; padding: 1.25rem 2rem;
                border-bottom: 1px solid var(--gray-200); gap: 0.75rem;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            }
            .pub-nav .nav-links.open { display: flex; }
            .pub-nav .nav-links a { font-size: 0.92rem; }
            .hero .container { grid-template-columns: 1fr; gap: 2rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero-visual { height: 280px; }
            .hero-stat-row { gap: 0.4rem; left: 0.75rem; right: 0.75rem; bottom: 0.75rem; }
            .hero-stat { padding: 0.5rem 0.4rem; }
            .hero-stat .val { font-size: 1rem; }
            .hero-stat .lbl { font-size: 0.55rem; }
            .features-grid { grid-template-columns: 1fr; }
            .steps-grid { grid-template-columns: 1fr; gap: 1.25rem; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .contact-grid { grid-template-columns: 1fr; }
            .cf-row { grid-template-columns: 1fr; }
            .trace-input-row { flex-direction: column; }
            .trace-btn { width: 100%; }
            section { padding: 3rem 1.25rem; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.8rem; }
            .hero-visual { height: 200px; }
            .hero-stat .val { font-size: 0.85rem; }
            .hero-stat .lbl { font-size: 0.5rem; }
            .section-title { font-size: 1.65rem; }
            .gallery-grid { grid-template-columns: 1fr; }
            section { padding: 2.5rem 1rem; }
            .pub-nav { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <nav class="pub-nav">
        <a href="/" class="logo">Trace<span>Greens</span></a>
        <button class="pub-hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links">
            <a href="/#about">About</a>
            <a href="/#how">How It Works</a>
            <a href="/#gallery">Gallery</a>
            <a href="/#trace">Trace</a>
            <a href="/#order">Order</a>
            <a href="/#order" class="nav-cta">Get in Touch</a>
        </div>
    </nav>
    {% block body %}{% endblock %}
    <footer class="pub-footer">
        <div class="f-brand">TraceGreens</div>
        <p>Chef-grade microgreens, fully traceable from seed to plate.<br>Navi Mumbai, India</p>
    </footer>
</body>
</html>
