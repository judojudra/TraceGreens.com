services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracegreens
      POSTGRES_PASSWORD: tracegreens
      POSTGRES_DB: tracegreens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracegreens"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tracegreens:tracegreens@db:5432/tracegreens
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
